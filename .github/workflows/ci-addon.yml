name: CI add-on

on:
  pull_request:
    paths:
      - "addon/**"
      - ".github/workflows/ci-addon.yml"
  push:
    branches:
      - main
    paths:
      - "addon/**"
      - ".github/workflows/ci-addon.yml"

env:
  CONTEXT_DIR: addon/teams_events

jobs:
  python:
    name: Python compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all add-on sources
        run: python -m compileall -q "${CONTEXT_DIR}/app"

  docker:
    name: Docker build (amd64, no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.CONTEXT_DIR }}/Dockerfile
          platforms: linux/amd64
          push: false
