name: Build and Publish Add-on Image

on:
  release:
    types:
      - published

env:
  IMAGE_NAME: nitor/ha-teams-events
  CONTEXT_DIR: addon/teams_events

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate release version
        id: version
        shell: bash
        run: |
          ADDON_VERSION="$(awk -F'"' '/^version:/{print $2}' "${CONTEXT_DIR}/config.yaml")"
          if [[ -z "${ADDON_VERSION}" ]]; then
            echo "Failed to parse add-on version from ${CONTEXT_DIR}/config.yaml"
            exit 1
          fi

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          EXPECTED_TAG="v${ADDON_VERSION}"
          if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag (${RELEASE_TAG}) must match add-on version (${EXPECTED_TAG})."
            exit 1
          fi

          echo "addon_version=${ADDON_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.addon_version }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.CONTEXT_DIR }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
